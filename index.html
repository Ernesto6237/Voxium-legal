<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voxium — Legal</title>
<style>
  :root {
    --bg: #0B0E14;
    --surface: #1A1F2B;
    --accent: #6236FF;
    --accent-light: #8B6FFF;
    --text: #F2F2F7;
    --text-dim: #9097A8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .logo span { color: var(--accent-light); }
  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 40px;
  }
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.btn {
    display: block;
    background: var(--surface);
    color: var(--text);
    text-decoration: none;
    padding: 16px 20px;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.06);
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  a.btn:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  footer {
    margin-top: 48px;
    color: var(--text-dim);
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">VOX<span>I</span>UM</div>
    <div class="tagline">Documentos legales</div>
    <div class="links">
      <a class="btn" href="privacidad.html">Política de Privacidad</a>
      <a class="btn" href="terminos.html">Términos de Uso</a>
    </div>
    <footer>Voxium · Traducción instantánea</footer>
  </div>
</body>
</html>
